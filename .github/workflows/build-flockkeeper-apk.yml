name: Build Flockkeeper Test APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'flockkeeper-apk-build/source/**'
      - '.github/workflows/build-flockkeeper-apk.yml'
  pull_request:
    paths:
      - 'flockkeeper-apk-build/source/**'
      - '.github/workflows/build-flockkeeper-apk.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Reconstruct Android source
        shell: bash
        run: |
          cat flockkeeper-apk-build/source/chunk-*.b64 | base64 --decode > /tmp/flockkeeper-source.tar.gz
          tar -xzf /tmp/flockkeeper-source.tar.gz -C flockkeeper-apk-build
          test -f flockkeeper-apk-build/app/src/main/java/com/flockkeeper/app/MainActivity.java
          test -f flockkeeper-apk-build/app/src/main/assets/www/app.js

      - name: Build debug APK
        working-directory: flockkeeper-apk-build
        run: gradle --no-daemon --stacktrace assembleDebug

      - name: Verify APK
        run: |
          test -f flockkeeper-apk-build/app/build/outputs/apk/debug/app-debug.apk
          cp flockkeeper-apk-build/app/build/outputs/apk/debug/app-debug.apk Flockkeeper-Test.apk
          sha256sum Flockkeeper-Test.apk | tee Flockkeeper-Test.apk.sha256
          unzip -t Flockkeeper-Test.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Flockkeeper-Test-APK
          path: |
            Flockkeeper-Test.apk
            Flockkeeper-Test.apk.sha256
          if-no-files-found: error
          retention-days: 30
